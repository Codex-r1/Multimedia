<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Audio Control Interface</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .player {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .controls {
      margin-top: 15px;
    }
    button {
      margin: 5px;
      padding: 10px 15px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      color: #4a90e2;
      transition: 0.3s;
    }
    button:hover {
      background: #f0f0f0;
    }
    input[type="range"] {
      width: 200px;
    }
    #progressBar {
      width: 100%;
      margin-top: 10px;
    }
    #timeDisplay {
      margin-top: 10px;
      font-weight: bold;
    }
    img {
      width: 200px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="player">
    <h2>Audio Player</h2>
    <audio id="audioPlayer" src="Party Don't Stop - Camp Mulla.mp3"></audio>

    <div class="controls">
      <button id="backwardBtn"> -10s</button>
      <button id="playBtn">▶Play</button>
      <button id="pauseBtn">⏸Pause</button>
      <button id="forwardBtn"> +10s</button>
      <button id="muteBtn"> Mute</button>
      <button id="loopBtn"> Loop</button>
      <br><br>
      <label>Volume: </label>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
      <br><br>
      <label>Speed: </label>
      <select id="speedControl">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
      <br><br>
      <input type="range" id="progressBar" min="0" max="100" value="0">
      <div id="timeDisplay">00:00 / 00:00</div>
    </div>
  </div>

  <script>
    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const speedControl = document.getElementById('speedControl');
    const timeDisplay = document.getElementById('timeDisplay');
    const progressBar = document.getElementById('progressBar');
    const forwardBtn = document.getElementById('forwardBtn');
    const backwardBtn = document.getElementById('backwardBtn');
    const loopBtn = document.getElementById('loopBtn');
    playBtn.addEventListener('click', () => audio.play());
    pauseBtn.addEventListener('click', () => audio.pause());
    muteBtn.addEventListener('click', () => {
      audio.muted = !audio.muted;
      muteBtn.textContent = audio.muted ? " Unmute" : " Mute";
    });
    volumeSlider.addEventListener('input', () => {
      audio.volume = volumeSlider.value;
    });
    speedControl.addEventListener('change', () => {
      audio.playbackRate = speedControl.value;
    });

    forwardBtn.addEventListener('click', () => {
      audio.currentTime += 10;
    });
    backwardBtn.addEventListener('click', () => {
      audio.currentTime -= 10;
    });

    loopBtn.addEventListener('click', () => {
      audio.loop = !audio.loop;
      loopBtn.textContent = audio.loop ? " Loop On" : " Loop Off";
    });

    // Progress Bar & Time Display
    audio.addEventListener('timeupdate', () => {
      const current = formatTime(audio.currentTime);
      const duration = formatTime(audio.duration);
      timeDisplay.textContent = `${current} / ${duration}`;
      progressBar.value = (audio.currentTime / audio.duration) * 100;
    });

    progressBar.addEventListener('input', () => {
      audio.currentTime = (progressBar.value / 100) * audio.duration;
    });

    function formatTime(seconds) {
      if (isNaN(seconds)) return "00:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    }
  </script>
</body>
</html>
